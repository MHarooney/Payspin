# Cap container log growth so a chatty/looping container can't fill the VPS disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    # Only the POSTGRES_* secrets — not the whole app env.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payspin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-payspin}
    volumes:
      - payspin_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payspin} -d ${POSTGRES_DB:-payspin}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--appendonly",
        "yes",
      ]
    volumes:
      - payspin_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  api:
    image: ${DOCKER_IMAGE:-payspin/api:latest}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/v1/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - internal
      - web

  web:
    image: ${DOCKER_WEB_IMAGE:-payspin/web:latest}
    restart: unless-stopped
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - web

  ops-api:
    image: ${DOCKER_OPS_API_IMAGE:-payspin/ops-api:latest}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.production
    environment:
      - OPS_API_PORT=3002
      - OPS_CORS_ORIGIN=${OPS_CORS_ORIGIN:-https://ops.payspin.io}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_JWT_EXPIRES_IN=${ADMIN_JWT_EXPIRES_IN:-15m}
      - PAYER_WEB_URL=${PAYER_WEB_URL:-https://pay.payspin.io}
      - CONSUMER_API_URL=${CONSUMER_API_URL:-http://api:3001/v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -S -qO /dev/null http://127.0.0.1:3002/admin/v1/dashboard/kpis 2>&1 | grep -q '401'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - web

  ops-web:
    image: ${DOCKER_OPS_WEB_IMAGE:-payspin/ops-web:latest}
    restart: unless-stopped
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - PORT=3003
      - HOSTNAME=0.0.0.0
    depends_on:
      ops-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/login"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Primary payer site + ops portal hostnames (automatic HTTPS via Let's Encrypt).
      - SITE_ADDRESS=${SITE_ADDRESS:-pay.payspin.io}
      - OPS_SITE_ADDRESS=${OPS_SITE_ADDRESS:-ops.payspin.io}
      - ACME_EMAIL=${ACME_EMAIL:-payspin.app@gmail.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - web

volumes:
  payspin_pg_data:
  payspin_redis_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    internal: true
  web:
