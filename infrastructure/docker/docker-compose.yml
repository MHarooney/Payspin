services:
  postgres:
    image: postgres:16-alpine
    container_name: payspin-postgres
    environment:
      POSTGRES_USER: payspin
      POSTGRES_PASSWORD: payspin_dev
      POSTGRES_DB: payspin
    ports:
      - "5435:5432"
    volumes:
      - payspin_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payspin -d payspin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payspin-redis
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  payspin_pg_data:
