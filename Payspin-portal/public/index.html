<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/payspin-ic.png" />
    
    <!-- Enhanced viewport settings for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    
    <!-- Theme and color meta tags -->
    <meta name="theme-color" content="#07D8DD" />
    <meta name="msapplication-TileColor" content="#07D8DD" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    
    <!-- Enhanced description and meta tags -->
    <meta
      name="description"
      content="Payspin Admin Portal - Comprehensive management platform for Payspin services, user management, and analytics"
    />
    <meta name="keywords" content="Payspin, Admin Portal, Management, Dashboard, Analytics, Users, Circles" />
    <meta name="author" content="Payspin" />
    
    <!-- Open Graph meta tags for social sharing -->
    <meta property="og:title" content="Payspin Admin Portal" />
    <meta property="og:description" content="Comprehensive management platform for Payspin services" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/payspin-ic.png" />
    
    <!-- Twitter Card meta tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Payspin Admin Portal" />
    <meta name="twitter:description" content="Comprehensive management platform for Payspin services" />
    <meta name="twitter:image" content="%PUBLIC_URL%/payspin-ic.png" />
    
    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo512.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/logo192.png" />
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Manifest for PWA capabilities -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    
    <!-- Accessibility improvements -->
    <meta name="robots" content="noindex, nofollow" />
    
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Payspin Admin Portal</title>
    
    <!-- Critical CSS for better loading performance -->
    <style>
      /* Critical CSS for initial render */
      body {
        margin: 0;
        font-family: 'Inter', 'Raleway', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #FAFBFC;
        overflow-x: hidden;
      }
      
      /* Loading spinner for better UX */
      #root:empty {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #FAFBFC;
      }
      
      #root:empty::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 4px solid #E5E7EB;
        border-top: 4px solid #07D8DD;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Prevent layout shift */
      html {
        scroll-behavior: smooth;
      }
      
      /* Touch-friendly tap highlights */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Better focus indicators for accessibility */
      *:focus {
        outline: 2px solid #07D8DD;
        outline-offset: 2px;
      }
      
      /* Skip link for keyboard navigation */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 6px;
        background: #07D8DD;
        color: white;
        padding: 8px;
        text-decoration: none;
        border-radius: 4px;
        z-index: 1000;
      }
      
      .skip-link:focus {
        top: 6px;
      }
    </style>
  </head>
  <body>
    <!-- Skip link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <noscript>
      <div style="
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #FAFBFC;
        color: #374151;
        font-family: 'Inter', sans-serif;
        text-align: center;
        padding: 20px;
      ">
        <div>
          <h1 style="color: #07D8DD; margin-bottom: 16px;">Payspin Admin Portal</h1>
          <p>You need to enable JavaScript to run this application.</p>
          <p style="font-size: 14px; margin-top: 16px; opacity: 0.7;">
            Please enable JavaScript in your browser settings and refresh the page.
          </p>
        </div>
      </div>
    </noscript>
    
    <div id="root"></div>
    
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
