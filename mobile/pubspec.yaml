name: payspin_mobile
description: Payspin mobile app — P2P payment links (Flutter)
publish_to: "none"
version: 1.7.0+18

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  google_fonts: ^6.3.2
  shared_preferences: ^2.5.3
  mobile_scanner: ^7.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^14.8.1
  get_it: ^8.0.3
  flutter_web_auth_2: ^5.0.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_auth: ^5.3.1
  firebase_remote_config: ^5.1.3
  local_auth: ^3.0.1
  crypto: ^3.0.7
  sensors_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/payspin_ic_opaque.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/payspin_ic_opaque.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/payspin_ic.png
    - assets/images/payspin_ic_opaque.png
    - assets/images/payspin_ic_white.png
    - assets/images/payspin_emblem_white.png
    - assets/images/payspin_emblem_gradient.png
    - assets/images/payspin_emblem_arc_white.png
    - assets/images/payspin_emblem_loop_white.png
    - assets/images/payspin_emblem_arc_gradient.png
    - assets/images/payspin_emblem_loop_gradient.png
    - assets/images/payspin_emblem_qr_center.png
    - assets/images/payspin_emblem_qr_center_light.png
    - assets/images/payspin_wordmark.png
    - assets/images/payspin_logo_lockup.png
    - shorebird.yaml
