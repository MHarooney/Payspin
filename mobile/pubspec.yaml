name: payspin_mobile
description: Payspin mobile app — P2P payment links (Flutter)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^9.2.4
  intl: ^0.19.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  google_fonts: ^6.3.2
  shared_preferences: ^2.5.3
  mobile_scanner: ^7.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^14.8.1
  get_it: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/payspin_ic.png
    - assets/images/payspin_ic_white.png
