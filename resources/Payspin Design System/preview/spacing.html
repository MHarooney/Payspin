<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #fff; padding: 20px; }
  .grid { display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .bar-wrap { flex: 1; height: 14px; background: #F5F5F5; border-radius: 4px; overflow: hidden; }
  .bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #D94DF8, #07D8DD); }
  .token { font-size: 10px; font-weight: 600; color: #606060; width: 60px; flex-shrink: 0; }
  .val { font-size: 10px; color: #9199A0; width: 34px; text-align: right; flex-shrink: 0; }
  .title { font-size: 11px; font-weight: 600; color: #212B36; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="title">Spacing Scale — base unit 4px</div>
  <div class="grid">
    <div class="row"><div class="token">--space-1</div><div class="bar-wrap"><div class="bar" style="width:4px;"></div></div><div class="val">4px</div></div>
    <div class="row"><div class="token">--space-2</div><div class="bar-wrap"><div class="bar" style="width:8px;"></div></div><div class="val">8px</div></div>
    <div class="row"><div class="token">--space-3</div><div class="bar-wrap"><div class="bar" style="width:12px;"></div></div><div class="val">12px</div></div>
    <div class="row"><div class="token">--space-4</div><div class="bar-wrap"><div class="bar" style="width:16px;"></div></div><div class="val">16px</div></div>
    <div class="row"><div class="token">--space-5</div><div class="bar-wrap"><div class="bar" style="width:20px;"></div></div><div class="val">20px</div></div>
    <div class="row"><div class="token">--space-6</div><div class="bar-wrap"><div class="bar" style="width:24px;"></div></div><div class="val">24px</div></div>
    <div class="row"><div class="token">--space-8</div><div class="bar-wrap"><div class="bar" style="width:32px;"></div></div><div class="val">32px</div></div>
    <div class="row"><div class="token">--space-10</div><div class="bar-wrap"><div class="bar" style="width:40px;"></div></div><div class="val">40px</div></div>
    <div class="row"><div class="token">--space-12</div><div class="bar-wrap"><div class="bar" style="width:48px;"></div></div><div class="val">48px</div></div>
    <div class="row"><div class="token">--space-14</div><div class="bar-wrap"><div class="bar" style="width:56px;"></div></div><div class="val">56px</div></div>
  </div>
</body>
</html>
