<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #F9F9F9; padding: 20px; }
  .section { font-size: 11px; font-weight: 600; color: #606060; margin: 0 0 8px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .box { display: flex; align-items: center; justify-content: center; background: #fff; font-size: 10px; color: #9199A0; font-weight: 500; }
  .label { font-size: 9px; color: #9199A0; text-align: center; max-width: 80px; }

  /* Radii */
  .r-pill  { width: 72px; height: 36px; border-radius: 100px; border: 1px solid #D5D6D8; }
  .r-card  { width: 56px; height: 44px; border-radius: 16px;  border: 1px solid #D5D6D8; }
  .r-input { width: 56px; height: 36px; border-radius: 10px;  border: 1px solid #D5D6D8; }
  .r-tag   { width: 50px; height: 28px; border-radius: 12px;  border: 1px solid #D5D6D8; }
  .r-sm    { width: 50px; height: 36px; border-radius: 8px;   border: 1px solid #D5D6D8; }
  .r-circ  { width: 40px; height: 40px; border-radius: 50%;   border: 1px solid #D5D6D8; }

  /* Shadows */
  .s-card  { width: 72px; height: 52px; border-radius: 12px;  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.08);  border: 1px solid #F5F5F5; }
  .s-strong{ width: 72px; height: 52px; border-radius: 12px;  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.24);  border: 1px solid #F5F5F5; }
  .s-input { width: 72px; height: 36px; border-radius: 10px;  box-shadow: 0px 1px 2px 0px rgba(228,229,231,0.24); border: 1px solid #EDF1F3; }
</style>
</head>
<body>
  <div class="section">Corner Radii</div>
  <div class="row">
    <div class="item"><div class="box r-pill"></div><div class="label">100px pill button</div></div>
    <div class="item"><div class="box r-card"></div><div class="label">16px card</div></div>
    <div class="item"><div class="box r-input"></div><div class="label">10px input</div></div>
    <div class="item"><div class="box r-tag"></div><div class="label">12px tag</div></div>
    <div class="item"><div class="box r-sm"></div><div class="label">8px small</div></div>
    <div class="item"><div class="box r-circ"></div><div class="label">50% avatar</div></div>
  </div>
  <div class="section">Elevation / Shadows</div>
  <div class="row">
    <div class="item"><div class="box s-card"></div><div class="label">Card 8px/0.08</div></div>
    <div class="item"><div class="box s-strong"></div><div class="label">FAB 8px/0.24</div></div>
    <div class="item"><div class="box s-input"></div><div class="label">Input 1px/0.24</div></div>
  </div>
</body>
</html>
