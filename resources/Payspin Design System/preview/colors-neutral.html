<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #fff; padding: 20px; }
  .row { display: flex; gap: 6px; align-items: flex-end; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 4px; min-width: 52px; flex: 1; }
  .chip { height: 52px; border-radius: 8px; width: 100%; border: 1px solid #F0F0F0; }
  .label { font-size: 9px; font-weight: 500; color: #606060; line-height: 1.3; }
  .hex { font-size: 9px; color: #9199A0; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#FFFFFF;"></div><div class="label">White / Surface</div><div class="hex">#FFFFFF</div></div>
  <div class="swatch"><div class="chip" style="background:#FCFCFC;"></div><div class="label">Neutral 50</div><div class="hex">#FCFCFC</div></div>
  <div class="swatch"><div class="chip" style="background:#F9F9F9;"></div><div class="label">BG Page</div><div class="hex">#F9F9F9</div></div>
  <div class="swatch"><div class="chip" style="background:#F8F8F8;"></div><div class="label">Surface Alt</div><div class="hex">#F8F8F8</div></div>
  <div class="swatch"><div class="chip" style="background:#F5F6F9;"></div><div class="label">Tab BG</div><div class="hex">#F5F6F9</div></div>
  <div class="swatch"><div class="chip" style="background:#F5F5F5;"></div><div class="label">Card Border</div><div class="hex">#F5F5F5</div></div>
  <div class="swatch"><div class="chip" style="background:#EDF1F3;"></div><div class="label">Divider</div><div class="hex">#EDF1F3</div></div>
  <div class="swatch"><div class="chip" style="background:#D5D6D8;"></div><div class="label">Stroke</div><div class="hex">#D5D6D8</div></div>
  <div class="swatch"><div class="chip" style="background:#8C8C8C;"></div><div class="label">Mid Stroke</div><div class="hex">#8C8C8C</div></div>
  <div class="swatch"><div class="chip" style="background:#606060;"></div><div class="label">Muted</div><div class="hex">#606060</div></div>
  <div class="swatch"><div class="chip" style="background:#263238;"></div><div class="label">Dark</div><div class="hex">#263238</div></div>
  <div class="swatch"><div class="chip" style="background:#0A0D13;"></div><div class="label">Darkest</div><div class="hex">#0A0D13</div></div>
</div>
</body>
</html>
