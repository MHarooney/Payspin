<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #F9F9F9; padding: 16px; }
  .section { font-size: 11px; font-weight: 600; color: #606060; margin-bottom: 8px; margin-top: 12px; }
  .section:first-child { margin-top: 0; }

  /* Circle card */
  .circle-card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #F5F5F5;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.08);
    padding: 16px;
    margin-bottom: 0;
  }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #D94DF8, #07D8DD); flex-shrink: 0; }
  .card-title { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 16px; color: #212B36; }
  .card-sub { font-size: 12px; color: #6C7278; }
  .big-num { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 700; color: #0A0D13; letter-spacing: 0.2px; }
  .progress-bar { height: 8px; border-radius: 8px; background: #EDF1F3; overflow: hidden; margin: 8px 0; }
  .progress-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, #D94DF8 0%, #6B96EA 56%, #07D8DD 100%); width: 35%; }
  .stat-row { display: flex; gap: 20px; margin-top: 4px; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 10px; color: #9199A0; }
  .stat-value { font-size: 12px; font-weight: 600; color: #263238; }

  /* Banner card */
  .banner-card {
    background: #008D8F;
    border-radius: 16px;
    padding: 16px;
    color: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .banner-title { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 16px; }
  .banner-sub { font-size: 11px; opacity: 0.85; line-height: 1.4; max-width: 180px; }
  .banner-cta { display: inline-flex; align-items: center; background: rgba(234,255,255,0.2); color: #fff; border-radius: 100px; height: 28px; padding: 0 14px; font-size: 11px; font-weight: 700; width: fit-content; margin-top: 2px; border: 1px solid rgba(255,255,255,0.3); }

  /* Stepper */
  .stepper { display: flex; align-items: center; gap: 0; margin: 4px 0; }
  .step-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .step-active { background: #D94DF8; color: #fff; }
  .step-inactive { background: #fff; border: 1.5px solid #D94DF8; color: #D94DF8; }
  .step-line { height: 2px; flex: 1; background: #07D8DD; }
</style>
</head>
<body>
  <div class="section">Circle Card</div>
  <div class="circle-card">
    <div class="card-header">
      <div class="avatar"></div>
      <div>
        <div class="card-title">Omar — "The First"</div>
        <div class="card-sub">Controller Device (Admin)</div>
      </div>
    </div>
    <div class="big-num">1,800 EUR</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div class="stat-row">
      <div class="stat"><div class="stat-label">Monthly</div><div class="stat-value">333 EUR</div></div>
      <div class="stat"><div class="stat-label">Duration</div><div class="stat-value">6 Months</div></div>
      <div class="stat"><div class="stat-label">Started</div><div class="stat-value">Jan 2025</div></div>
    </div>
  </div>

  <div class="section">Banner Card</div>
  <div class="banner-card">
    <div class="banner-title">Stay connected with us!</div>
    <div class="banner-sub">Follow us on our various platforms for the latest news and events.</div>
    <div class="banner-cta">Follow Us</div>
  </div>

  <div class="section">3-Step Progress Stepper</div>
  <div class="stepper">
    <div class="step-circle step-active">1</div>
    <div class="step-line"></div>
    <div class="step-circle step-inactive">2</div>
    <div class="step-line"></div>
    <div class="step-circle step-inactive">3</div>
  </div>
</body>
</html>
