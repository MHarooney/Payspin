name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @payspin/backend prisma:generate

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      # Lint tooling is not fully configured yet; keep it informational so it
      # never blocks a PR. Remove continue-on-error once eslint is wired up.
      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test
        run: pnpm test
